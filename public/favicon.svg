<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="#0f172a"/>

  <!-- Left bracket < -->
  <polyline
    points="12,8 5,16 12,24"
    fill="none"
    stroke="#22d3ee"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Slash / -->
  <line
    x1="19" y1="7"
    x2="13" y2="25"
    stroke="#67e8f9"
    stroke-width="2"
    stroke-linecap="round"
  />

  <!-- Right bracket > -->
  <polyline
    points="20,8 27,16 20,24"
    fill="none"
    stroke="#22d3ee"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
