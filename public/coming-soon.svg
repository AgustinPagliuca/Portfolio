<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#0f172a"/>
  <rect x="1" y="1" width="598" height="398" fill="none" stroke="#1e293b" stroke-width="2"/>

  <!-- Grid lines -->
  <line x1="0" y1="133" x2="600" y2="133" stroke="#1e293b" stroke-width="1"/>
  <line x1="0" y1="266" x2="600" y2="266" stroke="#1e293b" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="400" stroke="#1e293b" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="400" stroke="#1e293b" stroke-width="1"/>

  <!-- Glow circle -->
  <circle cx="300" cy="185" r="60" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.3"/>
  <circle cx="300" cy="185" r="45" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.2"/>

  <!-- Clock icon -->
  <circle cx="300" cy="185" r="28" fill="none" stroke="#06b6d4" stroke-width="2.5"/>
  <line x1="300" y1="165" x2="300" y2="185" stroke="#06b6d4" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="300" y1="185" x2="315" y2="193" stroke="#06b6d4" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="300" cy="185" r="3" fill="#06b6d4"/>

  <!-- Main text -->
  <text x="300" y="252" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" letter-spacing="6" fill="#06b6d4">COMING SOON</text>

  <!-- Sub text -->
  <text x="300" y="280" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" letter-spacing="2" fill="#475569">EN DESARROLLO</text>
</svg>
